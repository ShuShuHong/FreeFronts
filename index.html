*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f14;--surface:#1a1a24;--surface2:#22222e;--border:#2a2a3a;--text:#e0e0e8;--text2:#8888a0;--accent:#6c8cff;--accent2:#ff6b9d;--accent3:#4ade80;--radius:12px;--transition:.2s cubic-bezier(.4,0,.2,1)}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{max-width:1200px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:20px;height:100dvh}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:12px 0}
.logo{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:.8rem;color:var(--text2);font-weight:400;letter-spacing:0;-webkit-text-fill-color:var(--text2)}
.main-grid{display:grid;grid-template-columns:360px 1fr;grid-template-rows:1fr;gap:20px;flex:1;min-height:0;overflow:hidden}
@media(max-width:768px){.main-grid{grid-template-columns:1fr;min-height:0}.sidebar{order:2}}
.sidebar{display:flex;flex-direction:column;gap:16px;min-height:0;overflow:hidden}.sidebar,.preview-area{min-height:0}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column}
.panel-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:10px;font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.panel-count{font-size:.7rem;color:var(--accent);font-weight:400;text-transform:none;letter-spacing:0}
.copy-btn{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:.65rem;transition:all var(--transition);flex-shrink:0;margin-left:8px}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.font-search{margin-bottom:10px;flex-shrink:0}
.font-search input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.85rem;outline:none;font-family:inherit}
.font-search input:focus{border-color:var(--accent)}
.font-search input::placeholder{color:var(--text2)}
.font-list-panel{flex:1;overflow-y:auto;min-height:0;max-height:calc(100dvh - 320px);border:1px solid var(--border);border-radius:8px;background:var(--surface2)}
.font-list-panel::-webkit-scrollbar{width:5px}
.font-list-panel::-webkit-scrollbar-track{background:transparent}
.font-list-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.font-cat-header{padding:8px 14px 3px;font-size:.68rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;font-weight:600;background:var(--surface2);position:sticky;top:0;z-index:1;border-bottom:1px solid var(--border)}
.font-option{display:flex;align-items:center;padding:9px 14px;cursor:pointer;transition:background var(--transition);gap:6px;border-bottom:1px solid rgba(255,255,255,.03)}
.font-option:last-child{border-bottom:none}
.font-option:hover{background:var(--surface)}
.font-option.active{background:rgba(108,140,255,.12);color:var(--accent);border-left:3px solid var(--accent);padding-left:11px}

}

function updatePreviewText(){
  var val=textInput.value||'请输入参考文本…';
  previewText.innerHTML=val.replace(/\n/g,'<br>');
  charCount.textContent=textInput.value.length+' 字';
}

function handleDownload(){
  var font=getActiveFont();
  var fileName=font.num+'_'+font.name+'.'+font.ext.replace('truetype','ttf').replace('opentype','otf');
  var a=document.createElement('a');a.href=font.file;a.download=fileName;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('下载 '+font.name);
}

function copyFontName(){
  var font=getActiveFont();
  var text=font.num+' '+font.name;
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('已复制: '+text);}catch(e){showToast('复制失败，请手动复制');}
  document.body.removeChild(ta);
}

var toastTimer;
function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){toast.classList.remove('show');},2000);}

function init(){
  renderFontList('');
  applyPreview();
  updatePreviewText();
  fontSearch.addEventListener('input',function(){renderFontList(fontSearch.value);});
  textInput.addEventListener('input',function(){updatePreviewText();applyPreview();});
  sizeSlider.addEventListener('input',function(){state.fontSize=parseInt(sizeSlider.value);sizeValue.textContent=state.fontSize+'px';applyPreview();});
  lineHeightSlider.addEventListener('input',function(){state.lineHeight=parseFloat(lineHeightSlider.value);lineHeightValue.textContent=state.lineHeight;applyPreview();});
  document.querySelectorAll('.preset-btn').forEach(function(btn){btn.addEventListener('click',function(){textInput.value=this.dataset.text;updatePreviewText();applyPreview();});});
  downloadBtn.addEventListener('click',handleDownload);
  copyBtn.addEventListener('click',copyFontName);
  document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();textInput.focus();}});
}
init();
</script>
</body>
</html>
